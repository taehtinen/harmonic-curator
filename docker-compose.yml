services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: harmonic_curator
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d harmonic_curator"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 10s

  temporal:
    image: temporalio/auto-setup:1.25.2
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB: postgres12_pgx
      DB_PORT: "5432"
      POSTGRES_USER: postgres
      POSTGRES_PWD: postgres
      POSTGRES_SEEDS: db
    ports:
      - "7233:7233"

  temporal-ui:
    image: temporalio/ui:2.34.2
    restart: unless-stopped
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"

volumes:
  postgres_data:
